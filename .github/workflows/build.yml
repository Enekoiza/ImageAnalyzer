name: Build executables

# Compila ImageAnalyzer para Windows y macOS y publica los ejecutables
# como artefactos descargables. Se ejecuta en cada push a main, en cada
# tag v* y manualmente desde la pestaña Actions.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Ejecuta las acciones JS con Node.js 24 (evita el aviso de deprecación de
# Node.js 20 antes de que sea obligatorio).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            icon: assets/logo.ico
            add_data: "assets/logo.png;assets"
            artifact: ImageAnalyzer-windows
          - os: macos-latest
            icon: assets/logo.icns
            add_data: "assets/logo.png:assets"
            artifact: ImageAnalyzer-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: >
          pyinstaller --noconfirm --windowed --onefile
          --name ImageAnalyzer
          --icon ${{ matrix.icon }}
          --add-data "${{ matrix.add_data }}"
          main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
